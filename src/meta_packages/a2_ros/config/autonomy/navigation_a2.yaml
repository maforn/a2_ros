  ros__parameters:
    scanVoxelSize:          0.1
    decayTime:              10.0
    noDecayDis:             0.0
    clearingDis:            8.0
    useSorting:             true
    quantileZ:              0.25
    considerDrop:           true
    limitGroundLift:        true
    maxGroundLift:          0.25
    clearDyObs:             false
    minDyObsDis:            0.3
    minDyObsAngle:          0.0
    minDyObsRelZ:           -0.5
    absDyObsRelZThre:       0.2
    minDyObsVFOV:           -16.0
    maxDyObsVFOV:           16.0
    minDyObsPointNum:       1
    noDataObstacle:         false
    noDataBlockSkipNum:     0
    minBlockPointNum:       20
    vehicleHeight:          0.5
    voxelPointUpdateThre:   100
    voxelTimeUpdateThre:    2.0
    minRelZ:                -1.0
    maxRelZ:                1.5
    disRatioZ:              0.2

terrainAnalysisExt:
  ros__parameters:
    scanVoxelSize:          0.1
    decayTime:              10.0
    noDecayDis:             0.0
    clearingDis:            30.0
    useSorting:             true
    quantileZ:              0.25
    vehicleHeight:          0.5
    voxelPointUpdateThre:   10
    voxelTimeUpdateThre:    2.0
    lowerBoundZ:            -1.0
    upperBoundZ:            1.5
    disRatioZ:              0.1
    checkTerrainConn:       true
    terrainUnderVehicle:    -0.75
    terrainConnThre:        0.5
    ceilingFilteringThre:   2.0
    localTerrainMapRadius:  4.0

localPlanner:
  ros__parameters:
    # ── Robot footprint (actual A2 body: ~0.55 x 0.32 m) ─────────────────
    # Smaller footprint = planner commits through tighter gaps.
    vehicleLength:              0.55
    vehicleWidth:               0.50
    sensorOffsetX:              0.0
    sensorOffsetY:              0.0
    twoWayDrive:                false

    # ── Obstacle detection ────────────────────────────────────────────────
    laserVoxelSize:             0.05
    terrainVoxelSize:           0.2
    useTerrainAnalysis:         true
    checkObstacle:              true
    checkRotObstacle:           false   # do NOT block in-place rotation near walls
    adjacentRange:              2.0     # check obstacles only 2 m ahead — door frame not alarming from far
    obstacleHeightThre:         0.15
    groundHeightThre:           0.1
    costHeightThre:             0.1
    costScore:                  0.02
    useCost:                    false
    # Door frames produce ~3-6 terrain points along the optimal path.
    # Raise this so a couple of door-frame edge returns don't block the only viable path.
    pointPerPathThre:           6

    # ── Z range for obstacle classification ───────────────────────────────
    minRelZ:                    -0.5
    maxRelZ:                    1.2

    # ── Speed ─────────────────────────────────────────────────────────────
    maxSpeed:                   0.3
    autonomyMode:               true
    autonomySpeed:              1.0
    joyToSpeedDelay:            2.0
    joyToCheckObstacleDelay:    5.0

    # ── Path selection ────────────────────────────────────────────────────
    # dirThre: how far off the goal heading a candidate path can be.
    # Too wide (90°) → planner happily picks sideways "go around door" paths.
    # 65° keeps it committed toward the goal while still allowing corner arcs.
    dirWeight:                  0.04    # penalise off-goal paths a bit more
    dirThre:                    65.0    # committed forward, not roaming sideways
    dirToVehicle:               false
    pathScale:                  1.0
    minPathScale:               0.20    # squeeze path to 20% to fit tight doorways
    pathScaleStep:              0.05
    pathScaleBySpeed:           true
    minPathRange:               1.0
    pathRangeStep:              0.5
    pathRangeBySpeed:           true
    pathCropByGoal:             true
    goalClearRange:             0.2
    goalX:                      0.0
    goalY:                      0.0

pathFollower:
  ros__parameters:
    sensorOffsetX:      0.0
    sensorOffsetY:      0.0
    pubSkipNum:         1
    twoWayDrive:        false
    lookAheadDis:       0.5     # slightly longer lookahead smooths corner arcs
    yawRateGain:        7.0     # more responsive turning at corners (was 5.0)
    stopYawRateGain:    5.0
    maxYawRate:         45.0    # allow faster yaw to commit around corners (was 30°/s)
    maxSpeed:           0.3
    maxAccel:           1.0
    switchTimeThre:     1.0
    dirDiffThre:        0.15    # tolerate slightly larger heading error before stopping
    stopDisThre:        0.3
    slowDwnDisThre:     0.6
    useInclRateToSlow:  false
    inclRateThre:       120.0
    slowRate1:          0.25
    slowRate2:          0.5
    slowTime1:          2.0
    slowTime2:          2.0
    useInclToStop:      false
    inclThre:           45.0
    stopTime:           5.0
    noRotAtStop:        false
    noRotAtGoal:        true
    autonomyMode:       true
    autonomySpeed:      1.0
    joyToSpeedDelay:    2.0
