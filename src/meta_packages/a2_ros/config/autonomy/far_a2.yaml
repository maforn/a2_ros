far_planner:
  ros__parameters:
    # Robot dimensions - tuned for A2 (SMB defaults: robot_dim=0.8, vehicle_height=0.75)
    robot_dim:      0.35   # reduced so FAR planner routes through 0.6 m doors (localPlanner still enforces real clearance)
    vehicle_height: 0.5    # A2 standing height ~0.5 m

    # Sensor
    sensor_range:   10.0   # lidar cutoff 10 m
    terrain_range: 10.0
    local_planner_range: 5.0

    # Planning
    main_run_freq:  2.5
    is_static_env:  false
    is_pub_boundary: false

    # Contour detection
    voxel_dim: 0.2          # increase to 0.3 if contours are noisy

    # Goal
    g_planner/converge_distance: 0.3   # arrive closer so the robot commits to passing through the door

    # Dynamic obstacle decay
    util/dynamic_obs_dacay_time: 2.0
    g_planner/path_momentum_thred: 2 

    util/terrain_free_Z: 0.2