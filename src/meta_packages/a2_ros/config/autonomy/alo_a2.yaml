alo:
  ros__parameters:

    # ── Grid ─────────────────────────────────────────────────────────────
    resolution:       0.15    # m/cell
    grid_half_width:  40.0    # m each side → 534×534 cells

    # ── Lidar input ──────────────────────────────────────────────────────────
    lidar_topic:  /registered_scan  # world-frame cloud from registered_scan_pub
    voxel_size:   0.05              # m — voxel applied AFTER range+FOV filter

    # ── Ground segmentation (Z-band relative to robot body centre) ────────
    # Points classified by Z offset from rz_ (robot body Z in world frame):
    #   pz < rz + gs_z_min  →  ignored  (sub-floor noise)
    #   pz < rz + gs_z_max  →  ground   (skipped for map)
    #   pz < rz + z_max_rel →  obstacle (ray-cast into map)
    #   pz ≥ rz + z_max_rel →  ceiling  (discarded)
    #
    # A2 body centre is ~0.35–0.45 m above the floor.
    # Raise gs_z_max toward 0 if floor returns appear as obstacles.
    # Lower gs_z_min if sub-floor reflections cause ghost obstacles.
    gs_z_min:   -0.6    # m — ignore below this offset from body Z
    gs_z_max:   -0.1    # m — ground band upper limit (offset from body Z)

    # ── Non-ground / ceiling filter ───────────────────────────────────────
    z_max_rel:         1.8    # m above robot centre — discards ceiling returns

    # ── Ray tracing ───────────────────────────────────────────────────────
    max_ray_range:     7.0    # m — rays beyond this are clipped to FREE
    scan_fov_deg:    100.0    # deg — 360 for full lidar; restrict for camera-only

    # ── Hit-count occupancy accumulator ───────────────────────────────────
    occ_hit_threshold:   3    # confirmed-OCC requires this many scan hits (grid updates at lidar rate)
    occ_hit_decay:    0.80    # per-planning-tick decay for unconfirmed hits (1 Hz)

    # ── Morphological noise removal ────────────────────────────────────────
    # OCC cells with fewer than this many 4-connected OCC neighbours are removed
    # each tick. 1 = isolated singles only; 2 = also removes line endpoints.
    occ_min_neighbors:   1

    # ── Waypoint logic ────────────────────────────────────────────────────
    reach_dist:        1.0    # m — waypoint considered reached
    min_wp_dist:       1.2    # m — minimum advance per waypoint
    wp_timeout:       30.0    # s — blacklist if not reached in time

    # ── Robot footprint & navigation clearance ────────────────────────────
    robot_clear_radius:  0.1  # m — stamped FREE each tick
    nav_clearance:       0.40  # m — minimum wall clearance for approach waypoints

    # ── Timers ───────────────────────────────────────────────────────────
    planning_hz:      1.0     # Hz — replanning rate
    wp_publish_hz:    2.0     # Hz — keeps FAR planner fed
    viz_hz:           1.0     # Hz — RViz map/marker publish rate

    # ── Completion detection ──────────────────────────────────────────────
    done_timeout:     8.0     # s — confirm no reachable frontiers before declaring done
